name: Trigger Cloudflare Worker Sync (D1) Harian (Cicilan)

on:
  workflow_dispatch:
    inputs:
      pilihan_provinsi:
        description: '(Opsional) Timpa provinsi dengan manual (misal: DKI JAKARTA). Kosongkan untuk ikut jadwal.'
        type: string
        default: ''
  repository_dispatch:
    types: [trigger-cron]

permissions:
  actions: write
  contents: read

jobs:
  run-daily-chunk:
    runs-on: ubuntu-latest
    steps:
      - name: Ambil kode dari repository
        uses: actions/checkout@v3

      - name: Siapkan Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install module
        run: npm install

      - name: Tentukan Provinsi Berdasarkan Hari
        run: |
          DAY_OF_WEEK=$(TZ=Asia/Jakarta date +%u) # 1=Senin, 7=Minggu
          
          # Jika di-trigger manual dan ada input provinsi
          if [ "${{ github.event.inputs.pilihan_provinsi }}" != "" ]; then
            PROVINSI="${{ github.event.inputs.pilihan_provinsi }}"
            echo "Menjalankan manual untuk provinsi: $PROVINSI"
          else
            case $DAY_OF_WEEK in
              1) PROVINSI="JAWA BARAT, GORONTALO, SULAWESI BARAT" ;;
              2) PROVINSI="JAWA TIMUR, KEPULAUAN BANGKA BELITUNG, KALIMANTAN UTARA" ;;
              3) PROVINSI="JAWA TENGAH, BANTEN, KEPULAUAN RIAU, PAPUA BARAT, PAPUA BARAT DAYA" ;;
              4) PROVINSI="SUMATERA UTARA, DKI JAKARTA, ACEH, JAMBI, PAPUA, PAPUA SELATAN" ;;
              5) PROVINSI="SUMATERA SELATAN, LAMPUNG, RIAU, SUMATERA BARAT, PAPUA TENGAH, PAPUA PEGUNUNGAN" ;;
              6) PROVINSI="SULAWESI SELATAN, SULAWESI TENGGARA, SULAWESI TENGAH, SULAWESI UTARA, KALIMANTAN TIMUR, MALUKU, DI YOGYAKARTA, MALUKU UTARA" ;;
              7) PROVINSI="KALIMANTAN BARAT, KALIMANTAN SELATAN, KALIMANTAN TENGAH, NUSA TENGGARA TIMUR, NUSA TENGGARA BARAT, LUAR NEGERI, BALI, BENGKULU" ;;
            esac
            echo "Jadwal Hari $DAY_OF_WEEK: Menjalankan provinsi: $PROVINSI"
          fi
          
          echo "TARGET_PROVINSI=$PROVINSI" >> $GITHUB_ENV

      - name: Jalankan Skrip Custom (Cicilan Harian)
        env:
          CLOUDFLARE_WORKER_URL: ${{ secrets.CLOUDFLARE_WORKER_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          PILIHAN_BENTUK: "Semua"
          PILIHAN_PROVINSI: ${{ env.TARGET_PROVINSI }}
          MULAI_DARI_AWAL: "true"
        run: node fetch-custom.js