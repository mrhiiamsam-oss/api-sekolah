name: Trigger Cloudflare Worker Sync (D1) Harian (Cicilan)

on:
  workflow_dispatch:
    inputs:
      pilihan_provinsi:
        description: '(Opsional) Timpa provinsi dengan manual (misal: DKI JAKARTA). Kosongkan untuk ikut jadwal.'
        type: string
        default: ''
  repository_dispatch:

concurrency:
  group: "sekolah-sync"
  cancel-in-progress: false

permissions:
  actions: write
  contents: read

jobs:
  run-daily-chunk:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - name: Ambil kode dari repository
        uses: actions/checkout@v3

      - name: Siapkan Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install module
        run: npm install

      - name: Siapkan Parameter Trigger
        run: |
          if [ "${{ github.event.inputs.pilihan_provinsi }}" != "" ]; then
            PROVINSI="${{ github.event.inputs.pilihan_provinsi }}"
            echo "Menjalankan manual untuk provinsi: $PROVINSI"
            echo "IS_CRON=false" >> $GITHUB_ENV
          else
            echo "Menjalankan sesuai jadwal cerdas fetch-custom.js (Smart/Full Sync)"
            PROVINSI=""
            echo "IS_CRON=true" >> $GITHUB_ENV
          fi
          
          echo "TARGET_PROVINSI=$PROVINSI" >> $GITHUB_ENV

      - name: Jalankan Skrip Custom (Cicilan Harian)
        env:
          CLOUDFLARE_WORKER_URL: ${{ secrets.CLOUDFLARE_WORKER_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          PILIHAN_BENTUK: "Semua"
          PILIHAN_PROVINSI: ${{ env.TARGET_PROVINSI }}
          MULAI_DARI_AWAL: "true"
          IS_CRON_SCHEDULE: ${{ env.IS_CRON }}
        run: node fetch-custom.js

      - name: Jalankan Ulang Otomatis Jika Masih Ada Antrean dan Kuota Belum Habis
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f ada_sisa_harian.json ]; then
            echo "Deteksi masih ada sisa antrean provinsi hari ini dan kuota harian belum penuh."
            echo "Memicu workflow baru secara otomatis untuk melanjutkan penarikan..."
            gh workflow run jalankan-skrip.yml -f pilihan_provinsi="${{ github.event.inputs.pilihan_provinsi }}"
          else
            echo "Selesai! Seluruh antrean hari ini telah diproses atau kuota harian telah penuh."
          fi