# Dinonaktifkan: billing GitHub Actions — pakai Cloudflare Workers (lihat CLOUDFLARE.md)
name: Tarik Data API ke Neon

on:
  workflow_dispatch:
    inputs:
      mulai_dari_awal:
        description: 'Mulai dari offset 0 (centang hanya jika ingin scan ulang dari awal)'
        type: boolean
        default: false
  schedule:
    # Menggunakan standar waktu UTC.
    # Jam 16:00 UTC itu sama dengan Jam 23:00 WIB atau Jam 00:00 (Minggu dini hari) WITA.
    # Format cron: 'Menit Jam Hari-dalam-Bulan Bulan Hari-dalam-Minggu' (6 = Sabtu)
    - cron: '0 16 * * 6'

permissions:
  actions: write
  contents: read

jobs:
  run-script:
    if: false
    runs-on: ubuntu-latest
    steps:
      - name: Ambil kode dari repository
        uses: actions/checkout@v3

      - name: Siapkan Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install module PostgreSQL
        run: npm install

      - name: Jalankan Skrip
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # schedule (mingguan): scan penuh dari offset 0 | manual: sesuai centang | auto-retrigger: lanjut offset
          MULAI_DARI_AWAL: ${{ github.event_name == 'schedule' && '1' || (github.event_name == 'workflow_dispatch' && inputs.mulai_dari_awal && '1') || '' }}
        run: node index.js

      - name: Jalankan Ulang Otomatis Jika Belum Selesai
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f lanjutkan.txt ]; then
            echo "Deteksi data belum selesai. Memicu workflow baru (lanjut dari offset tersimpan)..."
            gh workflow run jalankan-skrip.yml -f mulai_dari_awal=false
          else
            echo "Selesai! Tidak ada data tersisa untuk ditarik."
          fi