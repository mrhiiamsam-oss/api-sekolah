name: Tarik Data API ke Neon

on:
  workflow_dispatch: # Tombol manual di dashboard GitHub tetap aktif jika ingin dicoba kapan saja
  schedule:
    # Menggunakan standar waktu UTC.
    # Jam 16:00 UTC itu sama dengan Jam 23:00 WIB atau Jam 00:00 (Minggu dini hari) WITA.
    # Format cron: 'Menit Jam Hari-dalam-Bulan Bulan Hari-dalam-Minggu' (6 = Sabtu)
    - cron: '0 16 * * 6'

permissions:
  actions: write
  contents: read

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Ambil kode dari repository
        uses: actions/checkout@v3

      - name: Siapkan Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install module PostgreSQL
        run: npm install

      - name: Jalankan Skrip
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node index.js

      - name: Jalankan Ulang Otomatis Jika Belum Selesai
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f lanjutkan.txt ]; then
            echo "Deteksi data belum selesai ditarik. Memicu workflow baru..."
            gh workflow run jalankan-skrip.yml
          else
            echo "Selesai! Tidak ada data tersisa untuk ditarik."
          fi